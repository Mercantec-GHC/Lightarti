services:
  postgres:
    image: postgres:17-alpine
    container_name: lightarti_postgres
    environment:
      POSTGRES_DB: lightarti_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

